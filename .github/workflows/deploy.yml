name: Deploy Docker Container to Azure App Service

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Azure Container Registry (ACR)
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and push Docker image to ACR
      run: |
        docker build \
          -t ${{ secrets.ACR_LOGIN_SERVER }}/counter-app:${{ github.sha }} \
          -t ${{ secrets.ACR_LOGIN_SERVER }}/counter-app:latest \
          .
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/counter-app:${{ github.sha }}
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/counter-app:latest

    - name: Deploy to Azure Web App (Container)
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        images: '${{ secrets.ACR_LOGIN_SERVER }}/counter-app:${{ github.sha }}'
