name: Deploy to Azure

on:
  push:
    branches: [ main ]

jobs:
  deploy-code:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - run: npm install

    - name: Deploy Node.js to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'fatima-counter-app'
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}

  deploy-docker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Login to ACR
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and push to ACR
      run: |
        docker build \
          -t ${{ secrets.ACR_LOGIN_SERVER }}/counter-app:${{ github.sha }} \
          -t ${{ secrets.ACR_LOGIN_SERVER }}/counter-app:latest \
          .
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/counter-app:${{ github.sha }}
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/counter-app:latest

    # Azure pulls automatically the new image via ACR Continuous Deployment webhook
